; Intended PHP upload limits for large CSV lead lists. NOTE: this OpenLiteSpeed/lsphp
; setup does NOT honor .user.ini for these directives, so the real fix is the chunked
; uploader in admin (csv_chunk). Left here in case php.ini handling changes.
upload_max_filesize = 64M
post_max_size = 80M
memory_limit = 256M
max_input_time = 180
max_execution_time = 180
